name: Automated Tests

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8
        env:
          MYSQL_ROOT_PASSWORD: pass@word1
          MYSQL_DATABASE: appointment_db
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3
        ports:
          - 3306:3306

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Start Backend Server
        run: |
          cd online-booking
          mvn clean install -q -Dmaven.test.skip=true
          timeout 120 mvn spring-boot:run &
          BACKEND_PID=$!
          sleep 25

          for i in {1..40}; do
            if curl -f -s -o /dev/null -w "%{http_code}" http://localhost:8081/api/services | grep -q "200"; then
              echo "Backend started successfully"
              break
            fi
            sleep 3
            if ! kill -0 $BACKEND_PID 2>/dev/null; then
              echo "Backend process died"
              exit 1
            fi
          done

      - name: Seed Database
        run: |
          mysql -h 127.0.0.1 -u root -ppass@word1 appointment_db < database/seed.sql

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: npm

      - name: Install Node Dependencies
        run: npm install

      - name: Install Playwright Browsers
        run: npx playwright install chromium --with-deps

      - name: Start Frontend Server
        run: |
          npx http-server -p 5500 -c-1 &
          sleep 5

      - name: Run Playwright Tests
        run: npx playwright test --project=chromium --workers=1

      - name: Upload Playwright Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

      - name: Upload Allure Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: allure-results/
          retention-days: 30

      - name: Install Allure
        run: npm install -g allure-commandline --save-dev

      - name: Generate Allure Report
        run: allure generate allure-results --clean -o allure-report

      - name: Deploy Allure Report to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: allure-report
