name: Automated Tests

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    services:
      mysql:
        image: mysql:8
        env:
          MYSQL_ROOT_PASSWORD: pass@word1
          MYSQL_DATABASE: appointment_db
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3
        ports:
          - 3306:3306

    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Java
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven
      
      - name: Initialize Database
        run: |
          mysql -h 127.0.0.1 -u root -ppass@word1 appointment_db < database/seed.sql
      
      - name: Start Backend Server
        run: |
          cd online-booking
          mvn clean install -q
          timeout 60 mvn spring-boot:run &
          echo "Waiting for backend to start..."
          sleep 15
          for i in {1..30}; do
            if curl -f http://localhost:8081/api/services > /dev/null 2>&1; then
              echo "Backend started successfully"
              exit 0
            fi
            echo "Attempt $i: Waiting for backend..."
            sleep 2
          done
          echo "Backend failed to start"
          exit 1
      
      - name: Set up Node
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: npm
      
      - name: Install Node Dependencies
        run: npm install
      
      - name: Install Playwright Browsers
        run: npx playwright install --with-deps
      
      - name: Start Frontend Server
        run: |
          npx http-server Capstone-Frontend -p 5500 -c-1 &
          sleep 5
          echo "Frontend server started"
      
      - name: Run Tests
        run: npm test
      
      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30
      
      - name: Upload Allure Results
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: allure-results
          path: allure-results/
          retention-days: 30
