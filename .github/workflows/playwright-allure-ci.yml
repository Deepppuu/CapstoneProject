name: Playwright Tests + Allure Report CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    services:
      mysql:
        image: mysql:8
        env:
          MYSQL_ROOT_PASSWORD: pass@word1
          MYSQL_DATABASE: appointment_db
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost -ppass@word1"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install Dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Build Backend
        run: |
          cd online-booking
          mvn clean install -DskipTests

      - name: Start Backend
        run: |
          cd online-booking
          nohup mvn spring-boot:run &
          sleep 80

      - name: Wait for Backend
        run: npx wait-on http://localhost:8081/api/services

      - name: Install MySQL Client
        run: |
          sudo apt-get update
          sudo apt-get install -y mysql-client

      - name: Seed Database
        run: |
          mysql -h 127.0.0.1 -uroot -ppass@word1 appointment_db <<EOF

          DELETE FROM payment;
          DELETE FROM booking;
          DELETE FROM slot;
          DELETE FROM \`user\`;
          DELETE FROM service_entity;

          INSERT INTO \`user\` (id,name,email,password) VALUES
          (1,'User1','user1@test.com','pass'),
          (2,'User2','user2@test.com','pass'),
          (3,'User3','user3@test.com','pass');

          INSERT INTO service_entity (id,description,name,price) VALUES
          (1,'Basic hair trim service','Hair Trim',150),
          (2,'Advanced hair cutting','Haircut Premium',300),
          (3,'Deep conditioning hair spa','Hair Spa Deluxe',600),
          (4,'Quick beard shave','Beard Shave',120),
          (5,'Premium beard styling','Beard Style Premium',350),
          (6,'Classic facial treatment','Facial Classic',650),
          (7,'Luxury facial treatment','Facial Luxury',1200),
          (8,'Professional hair coloring','Hair Color Premium',1800),
          (9,'Hair highlights styling','Hair Highlights',2000),
          (10,'Keratin hair treatment','Keratin Treatment',3500),
          (11,'Relaxing oil head massage','Oil Head Massage',350),
          (12,'Full body spa therapy','Body Spa',4000),
          (13,'Luxury body massage','Body Massage',2500),
          (14,'Express manicure service','Express Manicure',250),
          (15,'Express pedicure service','Express Pedicure',300),
          (16,'Full arm waxing treatment','Full Arm Waxing',700),
          (17,'Full leg waxing treatment','Full Leg Waxing',900),
          (18,'Eyebrow shaping service','Eyebrow Shaping',120),
          (19,'Hair wash and blow dry','Hair Wash',200),
          (20,'Professional party hairstyle','Party Hairstyle',900);

          INSERT INTO slot (id,booked,date,time,service_id) VALUES
          (1,0,'2026-04-05','09:00:00',1),
          (2,0,'2026-04-05','10:00:00',1),
          (3,0,'2026-04-05','11:00:00',1),
          (4,0,'2026-04-05','12:00:00',1),
          (5,0,'2026-04-05','13:00:00',1),
          (6,0,'2026-04-05','14:00:00',1);

          INSERT INTO booking (id,created_time,status,slot_id,user_id) VALUES
          (1,NOW(),'BOOKED',1,1),
          (2,NOW(),'BOOKED',6,2);

          INSERT INTO payment (id,amount,status,booking_id) VALUES
          (1,150,'PAID',1),
          (2,300,'PAID',2);

          EOF

      - name: Start Frontend
        run: |
          npx serve Capstone-Frontend -l 5500 &
          sleep 15

      - name: Run Playwright Tests
        run: npx playwright test --workers=2 --reporter=line,allure-playwright
        continue-on-error: true

      - name: Install Allure CLI
        run: npm install -g allure-commandline

      - name: Generate Allure Report
        run: npm run allure:generate

      - name: Deploy Allure Report
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: allure-report
