<!DOCTYPE html>

<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Register | BookEase</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
height:100vh;
display:flex;
align-items:center;
justify-content:center;
background:linear-gradient(135deg,#667eea,#764ba2,#6dd5ed);
background-size:400% 400%;
animation:gradientBG 10s ease infinite;
}

@keyframes gradientBG{
0%{background-position:0% 50%}
50%{background-position:100% 50%}
100%{background-position:0% 50%}
}

.register-container{
width:420px;
padding:40px;
border-radius:15px;
background:rgba(255,255,255,0.15);
backdrop-filter:blur(12px);
box-shadow:0 10px 40px rgba(0,0,0,0.25);
color:white;
}

.register-title{
text-align:center;
margin-bottom:25px;
font-weight:600;
}

.input-group{
margin-bottom:20px;
}

.input-group-text{
background:rgba(255,255,255,0.25);
border:none;
color:white;
}

.form-control{
background:rgba(255,255,255,0.2);
border:none;
color:white;
}

.form-control::placeholder{
color:#f1f1f1;
}

.form-control:focus{
box-shadow:none;
background:rgba(255,255,255,0.3);
color:white;
}

.register-btn{
width:100%;
padding:12px;
border:none;
border-radius:8px;
background:white;
color:#333;
font-weight:600;
transition:0.3s;
}

.register-btn:hover{
transform:scale(1.04);
background:#f3f3f3;
}

.login-text{
text-align:center;
margin-top:15px;
}

.login-text a{
color:white;
font-weight:500;
text-decoration:none;
}

.login-text a:hover{
text-decoration:underline;
}

</style>

</head>

<body>

<div class="register-container">

<h3 class="register-title">Create Account ✨</h3>

<!-- NAME -->

<div class="input-group">
<span class="input-group-text">
<i class="fa fa-user"></i>
</span>
<input type="text" id="name" class="form-control" placeholder="Enter your name">
</div>

<!-- EMAIL -->

<div class="input-group">
<span class="input-group-text">
<i class="fa fa-envelope"></i>
</span>
<input type="email" id="email" class="form-control" placeholder="Enter your email">
</div>

<!-- PASSWORD -->

<div class="input-group">
<span class="input-group-text">
<i class="fa fa-lock"></i>
</span>
<input type="password" id="password" class="form-control" placeholder="Create password">
</div>

<!-- CONFIRM PASSWORD -->

<div class="input-group">
<span class="input-group-text">
<i class="fa fa-lock"></i>
</span>
<input type="password" id="confirmPassword" class="form-control" placeholder="Confirm password">
</div>

<button class="register-btn" onclick="registerUser()">
Register
</button>

<div class="login-text">
Already have an account?
<a href="login.html">Login</a>
</div>

</div>

<script src="js/register.js"></script>

</body>

</html>
