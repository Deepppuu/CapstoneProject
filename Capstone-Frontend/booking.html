<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Confirm Booking | BookEase</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
background:linear-gradient(135deg,#eef2ff,#f9fafb);
font-family:'Segoe UI';
}

.booking-card{
background:white;
padding:30px;
border-radius:16px;
box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

.label{
font-weight:600;
color:#666;
}

.value{
font-size:18px;
font-weight:500;
}

.confirm-btn{
width:100%;
padding:14px;
border:none;
border-radius:10px;
background:#6c5ce7;
color:white;
font-weight:600;
transition:0.3s;
}

.confirm-btn:hover{
background:#574bdb;
}

.summary-box{
background:#f8f9ff;
padding:15px;
border-radius:10px;
margin-bottom:15px;
}
</style>

</head>

<body>

<!-- ✅ NAVBAR -->
<div id="navbar"></div>

<div class="container mt-5">

<h3 class="text-center mb-4">Confirm Your Booking</h3>

<div class="row justify-content-center">

<div class="col-md-6">

<div class="booking-card">

<div class="summary-box">
<div class="label">Service</div>
<div id="serviceName" class="value"></div>

<!-- hidden for tests -->
<div id="serviceDescription" style="display:none;"></div>
</div>

<div class="summary-box">
<div class="label">Date</div>
<div id="bookingDate" class="value"></div>
</div>

<div class="summary-box">
<div class="label">Time</div>
<div id="slotTime" class="value"></div>
</div>

<div class="summary-box">
<div class="label">Amount</div>
<div class="value">₹ <span id="price"></span></div>

<!-- hidden for tests -->
<span id="servicePrice" style="display:none;"></span>
</div>

<button class="confirm-btn" onclick="confirmBooking()">
Confirm Booking & Proceed to Payment
</button>

<!-- REQUIRED FOR TEST -->
<button class="btn btn-secondary cancel-btn mt-2" onclick="cancelBooking()">
Cancel
</button>

</div>

</div>

</div>

</div>

<script src="js/booking.js"></script>

<!-- ✅ NAVBAR LOADER -->
<script>
async function loadNavbar(){
  try{
    const res = await fetch("components/navbar.html");
    const html = await res.text();
    document.getElementById("navbar").innerHTML = html;
  }catch(e){
    console.error("Navbar load failed", e);
  }
}

loadNavbar();
</script>

</body>
</html>
