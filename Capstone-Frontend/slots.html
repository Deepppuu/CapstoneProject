<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Book Appointment | BookEase</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background:#f5f7fb;
font-family:'Segoe UI',sans-serif;
}

/* SERVICE CARD */

.service-info{
background:white;
padding:20px;
border-radius:12px;
box-shadow:0 5px 20px rgba(0,0,0,0.08);
margin-bottom:25px;
}

/* DATE BOX */

.date-box{
background:white;
padding:15px;
border-radius:10px;
margin-bottom:25px;
}

/* SLOT */

.slot{
padding:12px;
border-radius:8px;
border:1px solid #ddd;
text-align:center;
cursor:pointer;
font-weight:500;
transition:0.2s;
}

.slot:hover{
background:#6c5ce7;
color:white;
}

/* BOOKED SLOT */

.slot.booked{
background:#eee;
color:#aaa;
cursor:not-allowed;
pointer-events:none;
}

/* SELECTED SLOT */

.slot.selected{
background:#6c5ce7;
color:white;
border:none;
}

/* BUTTON */

.confirm-btn{
width:100%;
padding:12px;
font-size:16px;
font-weight:600;
border:none;
background:#6c5ce7;
color:white;
border-radius:10px;
}

.confirm-btn:hover{
background:#574bdb;
}

</style>

</head>

<body>

<div id="navbar"></div>

<div class="container mt-5">

<h3 class="mb-4" style="text-align: center;">Book Appointment</h3>

<!-- SERVICE INFO -->

<div class="service-info" id="serviceInfo">
Loading service...
</div>

<!-- DATE -->

<div class="date-box">

<label class="form-label"><b>Select Date</b></label>

<input type="date" id="bookingDate" class="form-control">

</div>

<!-- SLOTS -->

<h5 class="mb-3">Available Time Slots</h5>

<div class="row g-3" id="slots"></div>

<button class="confirm-btn mt-4" onclick="confirmBooking()">
Confirm Booking
</button>

</div>

<script>

fetch("components/navbar.html")
.then(res=>res.text())
.then(data=>{
document.getElementById("navbar").innerHTML=data;
});

</script>

<script src="js/slots.js"></script>

</body>

</html>
