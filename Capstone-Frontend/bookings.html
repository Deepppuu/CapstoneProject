<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>My Bookings</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
  background:#f5f7fb;
  font-family:'Segoe UI',sans-serif;
}

.page-title{
  text-align:center;
  margin:30px 0;
  font-weight:600;
}

.booking-card{
  background:white;
  border-radius:12px;
  padding:20px;
  margin-bottom:20px;
  box-shadow:0 5px 15px rgba(0,0,0,0.08);
}

.status{
  padding:5px 12px;
  border-radius:20px;
  font-size:12px;
  font-weight:600;
}

.booked{ background:#e6f4ea; color:#2e7d32; }
.cancelled{ background:#fdecea; color:#c62828; }
.rescheduled{ background:#fff4e5; color:#ef6c00; }

.btn-action{
  margin-right:8px;
}
</style>

</head>

<body>
<div id="navbar"></div> <!-- ✅ navbar loads -->

<div class="container">

<h3 class="page-title">My Bookings</h3>

<div id="bookingList"></div>

</div>

<!-- ✅ IMPORTANT -->
<script src="js/bookings.js"></script>

<script>
async function loadNavbar(){
  try{
    const res = await fetch("components/navbar.html");  // ✅ your path
    const html = await res.text();
    document.getElementById("navbar").innerHTML = html;
  }catch(e){
    console.error("Navbar load failed", e);
  }
}

loadNavbar();
</script>

</body>

</html>
