<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Payment | BookEase</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background:#f5f7fb;
font-family:'Segoe UI',sans-serif;
}

.page-title{
font-weight:600;
text-align:center;
margin-bottom:25px;
}

.payment-card{
background:white;
padding:25px;
border-radius:12px;
box-shadow:0 5px 20px rgba(0,0,0,0.08);
}

.payment-row{
display:flex;
justify-content:space-between;
padding:10px 0;
border-bottom:1px solid #eee;
}

.payment-label{
font-weight:600;
color:#555;
}

.payment-option{
border:1px solid #ddd;
border-radius:10px;
padding:12px;
margin-bottom:10px;
cursor:pointer;
}

.payment-option:hover{
border-color:#6c5ce7;
background:#f7f6ff;
}

.payment-option input{
margin-right:10px;
}

.pay-btn{
width:100%;
padding:12px;
font-weight:600;
border:none;
border-radius:10px;
background:#6c5ce7;
color:white;
margin-top:15px;
}

.pay-btn:hover{
background:#574bdb;
}

</style>

</head>

<body>

<div id="navbar"></div>

<div class="container mt-5">

<h3 class="page-title">Payment</h3>

<div class="row justify-content-center">

<div class="col-md-6">

<div class="payment-card">

<div class="payment-row">
<span class="payment-label">Service</span>
<span id="serviceName"></span>
</div>

<div class="payment-row">
<span class="payment-label">Date</span>
<span id="bookingDate"></span>
</div>

<div class="payment-row">
<span class="payment-label">Time</span>
<span id="slotTime"></span>
</div>

<div class="payment-row">
<span class="payment-label">Amount</span>
<span>₹ <span id="price"></span></span>
</div>

<h5 class="mt-4">Select Payment Method</h5>

<div class="payment-option">
<label>
<input type="radio" name="paymentMethod" value="UPI">
UPI
</label>
</div>

<div class="payment-option">
<label>
<input type="radio" name="paymentMethod" value="CARD">
Debit / Credit Card
</label>
</div>

<div class="payment-option">
<label>
<input type="radio" name="paymentMethod" value="CASH">
Cash at Salon
</label>
</div>

<button class="pay-btn" onclick="makePayment()">
Pay Now
</button>

</div>

</div>

</div>

</div>

<!-- LINK JS FILE -->
<script src="js/payment.js"></script>

</body>

</html>
